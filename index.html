<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYAXON – Scrap Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#f4f8ff;
--white:#ffffff;
--text:#0f172a;
--blue:#2563eb;
--light:#eaf2ff;
--accent:#e87c2a;
}

body{
font-family:'Barlow',sans-serif;
background:var(--bg);
color:var(--text);
}

/* NAV */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:15px 5%;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
z-index:100;
}

.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{text-decoration:none;color:#333;font-weight:600;}

.nav-cta{
background:var(--blue);
color:#fff;padding:10px 20px;text-decoration:none;
border-radius:4px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:120px 5%;
background:linear-gradient(135deg,#eef5ff,#dfeaff);
}

.hero h1{
font-size:70px;
font-family:'Bebas Neue';
}

.hero span{color:var(--blue);}

.hero p{margin:20px 0;}

.btn{
padding:12px 25px;
background:var(--blue);
color:#fff;text-decoration:none;
border-radius:4px;
}

/* SERVICES */
.services{
padding:80px 5%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#fff;
padding:30px;
border-radius:6px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* GALLERY */
.gallery{
padding:80px 5%;
background:#fff;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.gallery-grid img{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
}

/* CONTACT */
.contact{
padding:80px 5%;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

/* FOOTER */
footer{
background:#0f172a;
color:#fff;
padding:30px;
text-align:center;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <img src="logo.jpg" style="height:50px;">
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <a href="tel:+918217508843" class="nav-cta">Call</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>YOUR SCRAP <br><span>OUR EXPERTISE</span></h1>
    <p>Best scrap solutions in Bengaluru with trusted service.</p>
    <a href="#contact" class="btn">Get Quote</a>
  </div>
</section>

<!-- SERVICES -->
<section id="services" class="services">
  <h2>Our Services</h2><br>
  <div class="grid">
    <div class="card">💰 Best Price</div>
    <div class="card">🚛 Fast Pickup</div>
    <div class="card">🔒 Secure Payment</div>
    <div class="card">🌱 Eco Friendly</div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery" class="gallery">
  <h2>Gallery</h2><br>
  <div class="gallery-grid">
    <img src="scrap1.jpg">
    <img src="scrap2.jpg">
    <img src="scrap3.jpg">
    <img src="scrap4.jpg">
    <img src="scrap5.jpg">
    <img src="scrap6.jpg">
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Contact Us</h2><br>
  <input placeholder="Your Name">
  <input placeholder="Phone Number">
  <textarea placeholder="Your Message"></textarea>
  <button class="btn">Send</button>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 SKYAXON | Scrap Solutions</p>
</footer>

</body>
</html>
