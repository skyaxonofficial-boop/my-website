<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYAXON Scrap Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;color:#333;scroll-behavior:smooth;}
h1,h2{font-family:'Montserrat',sans-serif;}
section{padding:80px 20px;}
.container{max-width:1200px;margin:auto;}

/* NAV */
header{
  position:fixed;top:0;width:100%;
  background:#0b3a8f;color:#fff;z-index:1000;
}
.nav-container{
  display:flex;justify-content:space-between;
  align-items:center;padding:15px 20px;
}
.logo-area{display:flex;align-items:center;gap:10px;}
.logo-area img{height:50px;}
nav ul{display:flex;gap:20px;list-style:none;}
nav a{color:#fff;text-decoration:none;font-weight:bold;}
nav a:hover{color:#ffd700;}
.menu-toggle{display:none;cursor:pointer;font-size:24px}

/* HERO */
.hero{
  height:100vh;display:flex;align-items:center;
  justify-content:center;text-align:center;
  color:#fff;position:relative;
}
.hero::before{
  content:"";position:absolute;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
}
.hero-content{position:relative;z-index:2;}
.hero h1{font-size:50px;margin-bottom:20px;}
.hero p{font-size:20px;margin-bottom:30px;}

.btn{
  background:#ffd700;color:#0b3a8f;
  padding:12px 25px;border-radius:30px;
  text-decoration:none;font-weight:bold;
  margin:5px;display:inline-block;
}
.btn:hover{background:#fff}

/* SLIDER */
.slider{position:absolute;width:100%;height:100%;overflow:hidden;}
.slides{display:flex;width:500%;height:100%;animation:slide 20s infinite;}
.slides img{width:100%;height:100%;object-fit:cover;}

@keyframes slide{
0%,20%{margin-left:0;}
25%,45%{margin-left:-100%;}
50%,70%{margin-left:-200%;}
75%,95%{margin-left:-300%;}
100%{margin-left:-400%;}
}

/* SERVICES */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#fff;padding:20px;border-radius:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.card i{font-size:40px;color:#0b3a8f}

/* FOOTER */
footer{
background:#0b3a8f;color:#fff;
text-align:center;padding:20px;
}

/* WHATSAPP */
.whatsapp-btn{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:#fff;
width:60px;height:60px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:30px;
}

/* MOBILE */
@media(max-width:768px){
nav ul{
display:none;flex-direction:column;
background:#0b3a8f;
position:absolute;top:70px;right:0;
width:200px;
}
nav ul.show{display:flex;}
.menu-toggle{display:block;}
}
</style>
</head>

<body>

<header>
<div class="nav-container">
<div class="logo-area">
<img src="SKYAXON Logo.jpeg">
<h1>SKYAXON</h1>
</div>

<nav>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<ul id="menu">
<li><a href="#home">Home</a></li>
<li><a href="#services">Services</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
</div>
</header>

<!-- HERO -->
<section id="home" class="hero">
<div class="slider">
<div class="slides">
<img src="https://images.unsplash.com/photo-1513828583688-c52646db42da">
<img src="https://images.unsplash.com/photo-1581090700227-4c4d0d8c4e5d">
<img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
<img src="https://images.unsplash.com/photo-1581091012184-5c1cfa3d8f9c">
<img src="https://images.unsplash.com/photo-1497493292307-31c376b6e479">
</div>
</div>

<div class="hero-content">
<h1>Turn Your Scrap Into Value</h1>
<p>Trusted scrap buying & recycling in Bengaluru</p>

<a class="btn" href="tel:+918217508843">Call Now</a>
<a class="btn" href="https://wa.me/918217508843">WhatsApp</a>
</div>
</section>

<!-- SERVICES -->
<section id="services">
<div class="container">
<h2>Our Services</h2>
<div class="cards">
<div class="card"><i class="fas fa-industry"></i><p>Industrial Scrap</p></div>
<div class="card"><i class="fas fa-recycle"></i><p>Metal Scrap</p></div>
<div class="card"><i class="fas fa-dumpster"></i><p>Factory Clearance</p></div>
<div class="card"><i class="fas fa-laptop"></i><p>E-Waste</p></div>
</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<div class="container">
<h2>Contact Us</h2>
<p>📞 +91 8217508843</p>
<p>📧 skyaxonofficial@gmail.com</p>
</div>
</section>

<footer>
<p>© 2026 SKYAXON</p>
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/918217508843" class="whatsapp-btn">
<i class="fab fa-whatsapp"></i>
</a>

<!-- SCRIPT -->
<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
