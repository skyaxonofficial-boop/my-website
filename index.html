<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SKYAXON Scrap Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:#071a2f;
color:#fff;
}

/* NAV */
nav{
position:fixed;
top:0;width:100%;
background:#061426;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
z-index:1000;
}

.logo{display:flex;align-items:center;gap:10px;font-weight:800}
.logo img{height:45px}

nav ul{display:flex;gap:25px;list-style:none}
nav a{color:#ccc;text-decoration:none}
nav a:hover{color:#3b82f6}

.btn-call{
background:#3b82f6;
padding:10px 18px;
border-radius:6px;
color:#fff;
}

/* HERO */
.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
padding:0 60px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
}

.slide.active{opacity:1}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg,#071a2f 40%,transparent);
}

.hero-content{z-index:2;max-width:600px}

.hero h1{
font-size:60px;
font-weight:800;
line-height:1.1;
}

.hero span{color:#3b82f6}

/* SECTION */
section{padding:100px 60px}

.title{
font-size:40px;
font-weight:800;
margin-bottom:30px;
}

.title span{color:#3b82f6}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CARD */
.card{
background:#0d2a4d;
padding:25px;
border-radius:10px;
}

/* ===== GALLERY ===== */
.gallery{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

/* CONTACT */
.contact{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
background:#061426;
border:1px solid rgba(255,255,255,0.1);
color:#fff;
}

/* FOOTER */
footer{
background:#061426;
padding:30px;
text-align:center;
color:#aaa;
}

@media(max-width:768px){
.hero h1{font-size:35px}
.contact{grid-template-columns:1fr}
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">
<img src="SKYAXON Logo.jpeg">
SKYAXON
</div>

<ul>
<li><a href="#services">Services</a></li>
<li><a href="#gallery">Gallery</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

<a href="tel:8217508843" class="btn-call">CALL NOW</a>
</nav>

<!-- HERO -->
<section class="hero">

<div class="slide active" style="background-image:url('Untitled design_page-0001.jpg')"></div>
<div class="slide" style="background-image:url('Untitled design_page-0002.jpg')"></div>
<div class="slide" style="background-image:url('Untitled design_page-0003.jpg')"></div>

<div class="overlay"></div>

<div class="hero-content">
<h1>YOUR SCRAP.<br><span>OUR</span> EXPERTISE.</h1>
</div>

</section>

<!-- SERVICES -->
<section id="services">
<div class="title">OUR <span>SERVICES</span></div>

<div class="grid">
<div class="card">Best Market Value</div>
<div class="card">Fast Pickup</div>
<div class="card">Secure Payment</div>
<div class="card">Digital Tracking</div>
</div>
</section>

<!-- GALLERY -->
<section id="gallery">
<div class="title">SCRAP <span>GALLERY</span></div>

<div class="gallery">
<img src="Untitled design_page-0001.jpg">
<img src="Untitled design_page-0002.jpg">
<img src="Untitled design_page-0003.jpg">
<img src="Untitled design_page-0004.jpg">
<img src="Untitled design_page-0005.jpg">
<img src="Untitled design_page-0006.jpg">
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<div class="title">LET'S <span>CONNECT</span></div>

<div class="contact">

<div>
<p>📞 +91 8217508843</p>
<p>📧 skyaxonofficial@gmail.com</p>
</div>

<div>
<input placeholder="Name">
<input placeholder="Phone">
<textarea placeholder="Message"></textarea>
</div>

</div>
</section>

<footer>
© SKYAXON 2025
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>

/* SLIDER */
let slides=document.querySelectorAll('.slide');
let i=0;
setInterval(()=>{
slides[i].classList.remove('active');
i=(i+1)%slides.length;
slides[i].classList.add('active');
},3000);

/* GALLERY CLICK */
let imgs=document.querySelectorAll('.gallery img');
let lightbox=document.getElementById('lightbox');
let lightboxImg=document.getElementById('lightbox-img');

imgs.forEach(img=>{
img.onclick=()=>{
lightbox.style.display='flex';
lightboxImg.src=img.src;
}
});

lightbox.onclick=()=>lightbox.style.display='none';

</script>

</body>
</html>
